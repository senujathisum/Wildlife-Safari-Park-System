<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Wildlife Safari Park{% endblock %}</title>
    <style>
        :root {
            --vintage-bg: #f4ecd8;
            --vintage-text: #3c3a32;
            --vintage-accent: #6b8e23; /* Olive Drab */
            --vintage-border: #8b7355;
            --vintage-heading: #556b2f; /* Dark Olive Green */
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--vintage-bg);
            color: var(--vintage-text);
            margin: 0;
            padding: 0;
            background-image: radial-gradient(var(--vintage-bg) 60%, #e6d8b8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            text-align: center;
            padding: 2rem 1rem 1rem 1rem;
            border-bottom: 3px double var(--vintage-border);
            background-color: rgba(107, 142, 35, 0.1);
        }
        h1 {
            font-family: 'Georgia', serif;
            color: var(--vintage-heading);
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px #d2b48c;
        }
        p.subtitle {
            font-style: italic;
            color: var(--vintage-border);
            font-size: 1.2rem;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        nav {
            margin-top: 1rem;
            margin-bottom: 1rem;
        }
        nav a {
            color: var(--vintage-heading);
            text-decoration: none;
            font-weight: bold;
            margin: 0 15px;
            padding: 5px 10px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        nav a:hover {
            border: 1px dashed var(--vintage-border);
            background-color: #faf0e6;
        }
        .container {
            flex-grow: 1;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #fdfaf3;
            border: 1px solid var(--vintage-border);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .card {
            padding: 1.5rem;
            border: 1px dashed var(--vintage-border);
            background-color: #faf0e6; /* Linen */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(107, 142, 35, 0.3);
            border-color: var(--vintage-accent);
        }
        .card h2 {
            color: var(--vintage-heading);
            font-family: 'Georgia', serif;
            border-bottom: 1px solid var(--vintage-border);
            padding-bottom: 0.5rem;
            margin-top: 0;
        }
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: auto;
            border-top: 3px double var(--vintage-border);
            font-size: 0.9rem;
            color: var(--vintage-border);
            background-color: rgba(107, 142, 35, 0.05);
        }
        button {
            background-color: var(--vintage-accent);
            color: white;
            border: 2px solid var(--vintage-heading);
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: var(--vintage-heading);
        }
        /* Tables for Data */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--vintage-border);
        }
        th {
            background-color: #faf0e6;
            color: var(--vintage-heading);
            font-family: 'Georgia', serif;
        }
        tr:hover {
            background-color: rgba(107, 142, 35, 0.1);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <h1>The Wildlife Safari Park</h1>
        <p class="subtitle">Ranweli Wild Safari Park System</p>
        <nav>
            <a href="{% url 'index' %}">Home</a>
            <a href="{% url 'safari_app:bookings' %}">Bookings</a>
            <a href="{% url 'safari_app:guides' %}">Tour Guides</a>
            <a href="{% url 'safari_app:habitats' %}">Animal Tracking</a>
        </nav>
    </header>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        &copy; 2026 Ranweli Wild Safari Park. All rights reserved.
    </footer>
</body>
</html>
